name: Update PWA report cards

on:
  schedule:
    # Weekly refresh, Mondays 06:30 UTC (after the quality-check sweep)
    - cron: "30 6 * * 1"
  push:
    branches: [main]
    paths:
      - "data/apps.json"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  score:
    name: Score all apps and commit report cards
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Score apps
        run: node scripts/score-pwas.mjs
      - name: Fetch icons for apps that lack one
        run: node scripts/fetch-icons.mjs
      - name: Install Playwright (outside the repo — the site stays dependency-free)
        run: |
          npm install --prefix "$RUNNER_TEMP/pw" playwright
          "$RUNNER_TEMP/pw/node_modules/.bin/playwright" install --with-deps chromium
      - name: Build preview galleries for apps that lack one
        env:
          PLAYWRIGHT_DIR: ${{ runner.temp }}/pw
        run: node scripts/fetch-screenshots.mjs
      - name: Commit updated scores, icons, and screenshots
        run: |
          git add data/scores.json data/icons.json data/screenshots.json icons/apps screenshots
          if git diff --cached --quiet; then
            echo "Scores, icons, and screenshots unchanged — nothing to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "chore: refresh PWA report cards, icons, and screenshots [automated]"
          git push
