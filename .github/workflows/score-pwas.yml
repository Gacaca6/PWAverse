name: Update PWA report cards

on:
  schedule:
    # Weekly refresh, Mondays 06:30 UTC (after the quality-check sweep)
    - cron: "30 6 * * 1"
  push:
    branches: [main]
    paths:
      - "data/apps.json"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  score:
    name: Score all apps and commit report cards
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Score apps
        run: node scripts/score-pwas.mjs
      - name: Commit updated scores
        run: |
          if git diff --quiet data/scores.json; then
            echo "Scores unchanged — nothing to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/scores.json
          git commit -m "chore: refresh PWA report cards [automated]"
          git push
