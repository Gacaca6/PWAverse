name: Validate directory data

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    name: Validate apps.json
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Validate app directory data
        run: node scripts/validate-apps.mjs
